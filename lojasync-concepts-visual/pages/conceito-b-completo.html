<!DOCTYPE html>
<html lang="pt-BR" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LojaSync — Conceito B: Clareza Diurna (Completo)</title>
    <style id="theme-vars">
/* LojaSync Conceito B — Clareza Diurna (Light mode) */
:root {
  color-scheme: light;
  /* Single brand hue: indigo */
  --brand-primary: #4f46e5;
  --brand-primary-hover: #6366f1;
  --brand-primary-dim: rgba(79, 70, 229, 0.08);
  --brand-primary-border: rgba(79, 70, 229, 0.22);

  /* Neutral warm-white surfaces */
  --surface-base: #fafaf9;
  --surface-1: #ffffff;
  --surface-2: #f5f5f4;
  --surface-3: #ebebe9;
  --surface-elevated: #ffffff;

  /* Borders & text */
  --border-subtle: rgba(15, 23, 42, 0.06);
  --border-default: rgba(15, 23, 42, 0.10);
  --border-strong: rgba(15, 23, 42, 0.18);
  --text-primary: #0f172a;
  --text-secondary: #475569;
  --text-tertiary: #64748b;
  --text-disabled: #94a3b8;

  /* Status only (semantic) */
  --state-success: #059669;
  --state-success-dim: rgba(5, 150, 105, 0.10);
  --state-warning: #d97706;
  --state-warning-dim: rgba(217, 119, 6, 0.10);
  --state-error: #dc2626;
  --state-error-dim: rgba(220, 38, 38, 0.10);
  --state-info: #2563eb;
  --state-info-dim: rgba(37, 99, 235, 0.10);

  /* Radius scale (restrained) */
  --radius-sm: 6px;
  --radius-md: 10px;
  --radius-lg: 14px;
  --radius-full: 9999px;

  /* Typography */
  --font-sans: "Inter", system-ui, sans-serif;
  --font-mono: "JetBrains Mono", monospace;

  /* Spacing rhythm */
  --space-1: 4px;
  --space-2: 8px;
  --space-3: 12px;
  --space-4: 16px;
  --space-5: 20px;
  --space-6: 24px;
  --space-8: 32px;

  /* Shadows (restrained: floating only) */
  --shadow-pop: 0 12px 32px rgba(15, 23, 42, 0.12);
}

    </style>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>
    <script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>
    <style type="text/tailwindcss">

  @layer base {
    body { background: var(--ls-background); color: var(--ls-foreground); }
    td, th { @apply break-words; word-break: break-all; word-break: auto-phrase; }
    th { @apply whitespace-nowrap; }
  }
    </style>
    <style>
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      [data-icon] {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        -webkit-mask-size: contain;
        mask-size: contain;
        -webkit-mask-repeat: no-repeat;
        mask-repeat: no-repeat;
        -webkit-mask-position: center;
        mask-position: center;
        background-color: currentColor;
      }
    </style>
</head>
<body class="min-h-screen font-sans antialiased">
    <main class="min-h-screen flex flex-col" style="background: var(--surface-base); color: var(--text-primary); font-family: var(--font-sans);">

      <!-- ================================================================== -->
      <!-- ZONA 1 — TOPO: HEADER COMPACTO + STEPPER + STATUS + DIAGNÓSTICO   -->
      <!-- ================================================================== -->
      <header class="flex-shrink-0" style="background: var(--surface-1); border-bottom: 1px solid var(--border-default);">

        <!-- Linha 1: logo + identidade  ·  status chips  ·  relógio/engrenagem/toggle -->
        <div class="flex items-center justify-between px-6 py-3 gap-4" style="border-bottom: 1px solid var(--border-subtle);">
          <!-- Logo + identidade -->
          <div class="flex items-center gap-3 shrink-0">
            <div class="flex items-center justify-center w-9 h-9" style="background: var(--brand-primary-dim); border: 1px solid var(--brand-primary-border); border-radius: var(--radius-md); color: var(--brand-primary);">
              <i data-lucide="refresh-cw" class="w-5 h-5"></i>
            </div>
            <div class="flex flex-col leading-tight">
              <span class="text-[15px] font-semibold tracking-tight" style="color: var(--text-primary);">LojaSync</span>
              <span class="text-[11px] uppercase tracking-wider" style="color: var(--text-tertiary);">Cadastro assistido · Byte Empresa</span>
            </div>
          </div>

          <!-- Centro: chips de status (backend + automação) — discretos no light -->
          <div class="hidden md:flex items-center gap-2 flex-1 justify-center">
            <div class="inline-flex items-center gap-2 px-3 py-1.5" data-dom-id="chip-backend" style="background: var(--state-success-dim); border: 1px solid var(--border-subtle); border-radius: var(--radius-full);" title="API do backend responde em 12 ms">
              <span class="w-1.5 h-1.5 rounded-full" style="background: var(--state-success); box-shadow: 0 0 0 3px var(--state-success-dim);"></span>
              <span class="text-[12px] font-medium whitespace-nowrap" style="color: var(--state-success);">Backend online</span>
            </div>
            <div class="inline-flex items-center gap-2 px-3 py-1.5" data-dom-id="chip-automacao" style="background: var(--brand-primary-dim); border: 1px solid var(--border-subtle); border-radius: var(--radius-full);" title="Automação de cadastro configurada e pronta">
              <i data-lucide="zap" class="w-3.5 h-3.5" style="color: var(--brand-primary);"></i>
              <span class="text-[12px] font-medium whitespace-nowrap" style="color: var(--brand-primary);">Automação pronta</span>
            </div>
          </div>

          <!-- Direita: relógio + engrenagem + toggle modo simples -->
          <div class="flex items-center gap-2 shrink-0">
            <div class="inline-flex items-center gap-2 px-3 py-1.5" data-dom-id="relogio" style="background: var(--surface-2); border: 1px solid var(--border-default); border-radius: var(--radius-full);" title="Horário local do operador">
              <i data-lucide="clock" class="w-3.5 h-3.5" style="color: var(--text-tertiary);"></i>
              <span class="text-[12px] font-medium tabular-nums whitespace-nowrap" style="color: var(--text-secondary);">14:37 · Ter, 07 jul</span>
            </div>
            <button type="button" data-dom-id="btn-config" aria-label="Abrir configurações"
                    class="inline-flex items-center justify-center w-9 h-9 transition-colors duration-150"
                    style="background: var(--surface-2); color: var(--text-secondary); border: 1px solid var(--border-default); border-radius: var(--radius-md);"
                    onmouseover="this.style.background='var(--surface-3)'; this.style.color='var(--text-primary)';"
                    onmouseout="this.style.background='var(--surface-2)'; this.style.color='var(--text-secondary)';"
                    title="Configurações">
              <i data-lucide="settings" class="w-4 h-4"></i>
            </button>
            <!-- Toggle "Modo simples" (visual estático, estado off) -->
            <button type="button" data-dom-id="toggle-modo-simples" role="switch" aria-checked="false" aria-label="Alternar modo simples"
                    class="inline-flex items-center gap-2 px-2.5 h-9 transition-colors duration-150"
                    style="background: var(--surface-2); border: 1px solid var(--border-default); border-radius: var(--radius-md);"
                    onmouseover="this.style.borderColor='var(--border-strong)';"
                    onmouseout="this.style.borderColor='var(--border-default)';"
                    title="Modo simples oculta ferramentas avançadas">
              <span class="w-4 h-4 rounded-full relative shrink-0" style="background: var(--surface-3);">
                <span class="absolute top-0.5 left-0.5 w-3 h-3 rounded-full" style="background: var(--text-tertiary);"></span>
              </span>
              <span class="text-[12px] font-medium whitespace-nowrap" style="color: var(--text-tertiary);">Modo simples</span>
            </button>
          </div>
        </div>

        <!-- Linha 2: Stepper horizontal de 4 etapas (light, círculos com borda indigo) -->
        <nav class="px-6 py-3" aria-label="Progresso de cadastro">
          <ol class="flex items-center gap-2">
            <!-- Etapa 1: concluída -->
            <li class="flex items-center gap-3 flex-1">
              <div class="flex items-center gap-2.5 shrink-0">
                <div class="flex items-center justify-center w-7 h-7" style="background: var(--state-success-dim); border: 1px solid var(--border-subtle); border-radius: var(--radius-full);">
                  <i data-lucide="check" class="w-4 h-4" style="color: var(--state-success);"></i>
                </div>
                <div class="flex flex-col leading-tight">
                  <span class="text-[10px] uppercase tracking-wider" style="color: var(--text-tertiary);">Etapa 1</span>
                  <span class="text-[13px] font-medium whitespace-nowrap" style="color: var(--text-secondary);">Importar</span>
                </div>
              </div>
              <div class="flex-1 h-px" style="background: var(--state-success); opacity: 0.4;"></div>
            </li>
            <!-- Etapa 2: ativa (círculo indigo sólido) -->
            <li class="flex items-center gap-3 flex-1" data-dom-id="step-revisar">
              <div class="flex items-center gap-2.5 shrink-0">
                <div class="flex items-center justify-center w-7 h-7" style="background: var(--brand-primary); border: 1px solid var(--brand-primary); border-radius: var(--radius-full); box-shadow: 0 0 0 3px var(--brand-primary-dim);">
                  <span class="text-[12px] font-semibold" style="color: var(--surface-1);">2</span>
                </div>
                <div class="flex flex-col leading-tight">
                  <span class="text-[10px] uppercase tracking-wider font-semibold whitespace-nowrap" style="color: var(--brand-primary);">Etapa 2 · atual</span>
                  <span class="text-[13px] font-semibold whitespace-nowrap" style="color: var(--text-primary);">Revisar</span>
                </div>
              </div>
              <div class="flex-1 h-px" style="background: var(--border-default);"></div>
            </li>
            <!-- Etapa 3: pendente -->
            <li class="flex items-center gap-3 flex-1">
              <div class="flex items-center gap-2.5 shrink-0">
                <div class="flex items-center justify-center w-7 h-7" style="background: var(--surface-1); border: 1px solid var(--border-strong); border-radius: var(--radius-full);">
                  <span class="text-[12px] font-semibold" style="color: var(--text-tertiary);">3</span>
                </div>
                <div class="flex flex-col leading-tight">
                  <span class="text-[10px] uppercase tracking-wider" style="color: var(--text-tertiary);">Etapa 3</span>
                  <span class="text-[13px] font-medium whitespace-nowrap" style="color: var(--text-tertiary);">Grades</span>
                </div>
              </div>
              <div class="flex-1 h-px" style="background: var(--border-default);"></div>
            </li>
            <!-- Etapa 4: pendente (sem conector final) -->
            <li class="flex items-center gap-2.5 shrink-0">
              <div class="flex items-center justify-center w-7 h-7" style="background: var(--surface-1); border: 1px solid var(--border-strong); border-radius: var(--radius-full);">
                <span class="text-[12px] font-semibold" style="color: var(--text-tertiary);">4</span>
              </div>
              <div class="flex flex-col leading-tight">
                <span class="text-[10px] uppercase tracking-wider" style="color: var(--text-tertiary);">Etapa 4</span>
                <span class="text-[13px] font-medium whitespace-nowrap" style="color: var(--text-tertiary);">Cadastrar</span>
              </div>
            </li>
          </ol>
        </nav>

        <!-- Linha 3: Diagnóstico de importação (recolhível, aberto) -->
        <div class="px-6 pb-3">
          <div data-dom-id="diagnostico-import" style="background: var(--surface-2); border: 1px solid var(--border-subtle); border-radius: var(--radius-md);">
            <button type="button" class="w-full flex items-center justify-between gap-3 px-4 py-2.5 text-left">
              <div class="flex items-center gap-2.5 min-w-0">
                <i data-lucide="file-check-2" class="w-4 h-4 shrink-0" style="color: var(--state-success);"></i>
                <span class="text-[13px] font-medium truncate" style="color: var(--text-secondary);">Importação concluída</span>
                <span class="text-[12px] tabular-nums shrink-0" style="color: var(--text-tertiary);">· 47 produtos · 312 unidades</span>
              </div>
              <div class="flex items-center gap-2 shrink-0">
                <span class="text-[11px] uppercase tracking-wider" style="color: var(--state-success);">Sucesso</span>
                <i data-lucide="chevron-down" class="w-4 h-4" style="color: var(--text-tertiary);"></i>
              </div>
            </button>
          </div>
        </div>
      </header>
    <script>lucide.createIcons();</script>
</body>
</html>
